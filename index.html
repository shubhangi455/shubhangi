<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My DevOps Static Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1e3a8a;
    }

    p {
      font-size: 18px;
      color: #333;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #2563eb;
      color: white;
      border-radius: 25px;
      font-weight: bold;
    }

    footer {
      margin-top: 30px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to My Static Web Page</h1>
    <p>
      This is a simple HTML static page created for my Git and GitHub homework.
    </p>
    <p>
      In this task, I initialized a local Git repository, added files, committed changes,
      and pushed the project to GitHub.
    </p>

    <div class="badge">Git + GitHub Homework</div>

    <footer>
      Created by Shubhangi Nakrani
    </footer>
  </div>

</body>
</html>
